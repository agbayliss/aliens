<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Companions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Strait&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="after/styles.css">
    <style>
        @media (min-width: 601px) {
            body {
                min-height: 100vh;
                display: flex;
                align-items: center;
                padding-top: 40px;
                padding-bottom: 40px;
            }
        }

        .landing-container {
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .landing-container h1 {
            margin-bottom: 48px;
            text-align: center;
        }

        .cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 48px;
        }

        .landing-card {
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .landing-card-visual {
            aspect-ratio: 1 / 1;
            overflow: hidden;
            border: 1px solid var(--border-selected);
            transform-style: preserve-3d;
            will-change: transform;
            transition: transform 0.6s ease, box-shadow 0.6s ease;
        }

        .landing-card-visual.is-tilting {
            transition: none;
        }

        .landing-card-visual img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
        }

        .landing-card-body {
            display: flex;
            flex-direction: column;
        }

        .landing-card-body h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .landing-card-body p {
            font-size: 0.875rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 12px;
        }

        .landing-card-body .card-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8125rem;
            color: var(--accent);
            text-decoration: none;
            transition: color 0.2s;
            font-family: var(--sans);
        }

        .landing-card-body .card-link:hover { color: var(--text); }

        .landing-card-body .card-link svg {
            width: 16px;
            height: 16px;
        }

        @media (max-width: 600px) {
            .cards {
                grid-template-columns: 1fr;
            }
            .landing-container {
                padding-top: 48px;
            }
        }
    </style>
</head>
<body>

<div class="landing-container">

    <h1>Cosmic Companions Redesign</h1>

    <div class="cards">

        <div class="landing-card">
            <a href="before/index.html" class="landing-card-visual">
                <img src="before-img.png" alt="Before redesign screenshot">
            </a>
            <div class="landing-card-body">
                <h2>Before</h2>
                <p>Vibe coded with Claude, no visual instruction or design input.</p>
                <a href="before/index.html" class="card-link">View Before <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg></a>
            </div>
        </div>

        <div class="landing-card">
            <a href="after/index.html" class="landing-card-visual">
                <img src="after-img.png" alt="After redesign screenshot">
            </a>
            <div class="landing-card-body">
                <h2>After</h2>
                <p>Redesigned with Claude Code + Paper over three days.</p>
                <a href="after/index.html" class="card-link">View After <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg></a>
            </div>
        </div>

    </div>

</div>

<script>
    const MAX_TILT = 4;
    const PERSPECTIVE = 800;

    document.querySelectorAll('.landing-card-visual').forEach(el => {
        el.style.perspective = `${PERSPECTIVE}px`;

        el.addEventListener('mousemove', e => {
            const rect = el.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width  - 0.5;
            const y = (e.clientY - rect.top)  / rect.height - 0.5;
            el.classList.add('is-tilting');
            el.style.transform = `perspective(${PERSPECTIVE}px) rotateY(${x * MAX_TILT}deg) rotateX(${-y * MAX_TILT}deg)`;
        });

        el.addEventListener('mouseleave', () => {
            el.classList.remove('is-tilting');
            el.style.transform = 'perspective(800px) rotateY(0deg) rotateX(0deg)';
        });
    });
</script>
</body>
</html>
